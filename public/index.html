<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-adsense-account" content="ca-pub-8983851567536524">
    <title>Vinyl Analog - Authentic Sound</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JCY60G7C8B"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-JCY60G7C8B');
    </script>
    <link rel="stylesheet" href="style.css?v=4">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8983851567536524"
     crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Roboto+Mono:wght@400;700&family=Cedarville+Cursive&display=swap" rel="stylesheet">
    
    <!-- React & Supabase Ecosystem for Widgets -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Ad Rail -->
        <aside class="ad-rail left">
            <div class="ad-placeholder">Ad Space</div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1 class="logo">Vinyl Analog <span class="tagline">Authentic warmth for digital souls.</span></h1>
            </header>

            <section class="turntable-wrapper" id="turntableWrapper">
                <div class="theme-selector">
                    <button class="theme-dot obsidian" data-theme="theme-obsidian" title="Obsidian"></button>
                    <button class="theme-dot walnut active" data-theme="theme-walnut" title="Walnut"></button>
                    <button class="theme-dot warm" data-theme="theme-warm" title="Cognac"></button>
                    <button class="theme-dot alabaster" data-theme="theme-alabaster" title="Alabaster"></button>
                </div>
                
                <!-- The Slide-out Record Sleeve for Metadata -->
                <div class="record-sleeve" id="recordSleeve">
                    <div class="sleeve-texture"></div>
                    <div class="sleeve-metadata">
                        <h2 class="handwritten" id="sleeveTitle">Unknown Track</h2>
                        <p class="handwritten" id="sleeveArtist">Anonymous Label</p>
                    </div>
                </div>

                <div class="turntable-hero" id="turntableHero">
                    <!-- The wood chassis -->
                    <div class="dust-cover-hinges">
                        <div class="hinge left"></div>
                        <div class="hinge right"></div>
                    </div>
                    
                    <div class="turntable-platter">
                        <div class="platter-edge"></div>
                        <div class="vinyl-record" id="vinylRecord">
                            <div class="center-label" id="centerLabel">
                                <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 150 150">
                                    <rect width="150" height="150" fill="var(--plinth-base)"/>
                                    <circle cx="75" cy="75" r="70" fill="none" stroke="black" stroke-width="3"/>
                                    <text x="50%" y="50%" font-family="var(--font-heading)" font-style="italic" font-size="28" fill="var(--accent-color)" dominant-baseline="middle" text-anchor="middle">Vinyl</text>
                                </svg>
                                <img id="albumArt" class="hidden" alt="Album Art" style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:2; border-radius:50%; mix-blend-mode: multiply; opacity: 0.8; pointer-events: none;">
                            </div>
                            <div class="grooves"></div>
                        </div>
                    </div>

                    <!-- Tonearm System -->
                    <div class="tonearm-base">
                        <div class="tonearm-pivot"></div>
                        <div class="tonearm" id="tonearm">
                            <div class="counterweight"></div>
                            <div class="arm-stick"></div>
                            <div class="headshell">
                                <div class="stylus"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Arm Rest -->
                    <div class="arm-rest"></div>
                    
                    <div class="controls panel-controls">
                        <div class="knob-group">
                            <div class="knob" data-control="volume"><div class="indicator"></div></div>
                            <label>Vol</label>
                        </div>
                        <div class="knob-group">
                            <div class="knob" data-control="warmth"><div class="indicator"></div></div>
                            <label>Warm</label>
                        </div>
                        <div class="knob-group">
                            <div class="knob" data-control="crackle"><div class="indicator"></div></div>
                            <label>Crackle</label>
                        </div>
                    </div>
                </div>
            </section>

            <section class="converter-interface">
                <div class="input-group">
                    <input type="text" id="youtubeUrl" placeholder="Search track name or paste YouTube URL..." autocomplete="off">
                    <div class="button-group">
                        <button id="convertBtn">Draw Record</button>
                        <button id="pauseBtn" class="secondary hidden">Pause</button>
                    </div>
                </div>
                <div id="statusMessage" class="status"></div>
                
                <!-- Affiliate Integration Button -->
                <button id="affiliateBtn" class="affiliate-btn hidden">🔍 Find this on Real Vinyl</button>

                <!-- YouTube IFrame Target -->
                <div id="youtube-player-placeholder"></div>
            </section>

            <!-- React Auth Gate Root -->
            <div id="react-auth-root"></div>
            <div id="react-shopping-root"></div>
            <div id="react-search-root"></div>

        </main>

        <!-- Sidebar React Crate Root -->
        <aside class="react-crate-container" id="react-crate-root"></aside>
    </div>

    <footer class="sticky-footer">
        <div class="ad-banner">
            <!-- AdSense Unit -->
            <div class="ad-placeholder">Wide Skyscraper Ad</div>
        </div>
        <div class="footer-links">
            <a href="#">Terms</a>
            <a href="#">Privacy</a>
            <a href="/admin" class="hidden">Admin Dashboard</a>
        </div>
    </footer>

    <!-- App Logic -->
    <script src="script.js?v=3"></script>
    
    <!-- React Components -->
    <script type="text/babel" src="reactComponents.jsx?v=3"></script>
</body>
</html>
